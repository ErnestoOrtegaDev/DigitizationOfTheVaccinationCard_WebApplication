version: '3.8'

services:
  # ----------------------------------------
  # 1. Base de Datos: MySQL 8.0
  # ----------------------------------------
  vacunapp-mysql:
    image: mysql:8.0
    container_name: vacunapp_mysql
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vacunapp-network
    # NUEVO: Verificador de salud para saber cuándo MySQL está listo
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ----------------------------------------
  # 2. Caché y Sesiones: Redis
  # ----------------------------------------
  vacunapp-redis:
    image: redis:7-alpine
    container_name: vacunapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vacunapp-network

  # ----------------------------------------
  # 3. Backend: Node.js (Express)
  # ----------------------------------------
  vacunapp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    container_name: vacunapp_backend
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DB_HOST=vacunapp-mysql
      - REDIS_HOST=vacunapp-redis
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      vacunapp-redis:
        condition: service_started
      vacunapp-mysql:
        condition: service_healthy 
    networks:
      - vacunapp-network

  # ----------------------------------------
  # 4. Frontend: React / Vite
  # ----------------------------------------
  vacunapp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vacunapp_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env 
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - vacunapp-network

volumes:
  mysql_data:
  redis_data:

networks:
  vacunapp-network:
    driver: bridge